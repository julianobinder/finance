services:
  db:
    image: postgres:18-alpine
    container_name: finance-db
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: Lem0n4de-
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    environment:
      POSTGRESQL_URL: postgresql://finance:<yourpassworsecure>:5432/finance
      SECRET_KEY: django-insecure-your-super-secret-key-here-change-this-in-production-123456789
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"
      LOG_LEVEL: INFO
      CURRENCY_URL: https://api.currencyfreaks.com/v2.0/rates/latest
      CURRRENCY_API: 
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
